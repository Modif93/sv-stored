name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Check, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm -F @modif93/sv-stored exec playwright install --with-deps chromium

      - name: Type check
        run: pnpm check

      - name: Unit tests
        run: pnpm -F @modif93/sv-stored exec vitest --run

      - name: Playwright tests
        run: pnpm -F @modif93/sv-stored exec playwright test

      - name: Build packages
        run: pnpm build:packages
